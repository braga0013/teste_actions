name: Documentar e enviar para Asana

on:
  push:
    branches:
      - main

jobs:
  document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Listar arquivos alterados
        run: |
          git diff HEAD~1 HEAD --name-only > files_changed.txt
          echo "Arquivos alterados:"
          cat files_changed.txt

      - name: Salvar como artefato (debug)
        uses: actions/upload-artifact@v4
        with:
          name: arquivos-alterados
          path: files_changed.txt
